name: "Terraform セットアップ"
description: "Terraform のインストール・初期化・検証を行う共通アクション"

inputs:
  tf_api_token:
    description: "Terraform Cloud API トークン（Cloud backend の場合のみ）"
    required: false
    default: ""
  aws_access_key_id:
    description: "S3 backend 用アクセスキー ID（S3 backend の場合のみ）"
    required: false
    default: ""
  aws_secret_access_key:
    description: "S3 backend 用シークレットアクセスキー（S3 backend の場合のみ）"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Terraform をセットアップ
      uses: hashicorp/setup-terraform@v3

    - name: terraform init
      working-directory: infra
      shell: bash
      env:
        TF_TOKEN_app_terraform_io: ${{ inputs.tf_api_token }}
        AWS_ACCESS_KEY_ID: ${{ inputs.aws_access_key_id }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.aws_secret_access_key }}
      run: terraform init -input=false

    - name: terraform fmt check
      working-directory: infra
      shell: bash
      run: terraform fmt -check

    - name: terraform validate
      working-directory: infra
      shell: bash
      run: terraform validate
